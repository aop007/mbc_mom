[workspace]
authors = ["Alexis Ouellet Patenaude <alexis.ouellet.patenaude@gmail.com>"]
channels = ["conda-forge"]
name = "mbc-mom"
platforms = ["linux-64"]
version = "0.1.0"
description = "Multiradius Bridge Currents Method of Moments Solver"

[tasks]
# Shortcut to build and compile the Rust module via maturin
build-dev = "maturin develop"

[dependencies]
rust = ">=1.96.0,<1.97"
python = ">=3.14.6,<3.15"
numpy = ">=2.5.0,<3"
matplotlib = ">=3.11.0,<4"
maturin = ">=1.14.1,<2"
pip = ">=26.1.2,<27"

[pypi-dependencies]
# We tell pixi to install our local directory in editable mode
mbc-mom = { path = ".", editable = true }
